display_information:
  name: Nelson
  description: Ai powered assistant for Nelson — answers in Slack on behalf of the asking user.
  background_color: "#285557"
  long_description: |
    Nelson is a GDPR compliant Claude-powered teammate that lives in Slack and answers questions about Nelson PMS. Ask it anything from your workspace — hotel availability, reservation details, booking trends, configuration lookups — and it acts as you, not as a shared service account. The first time you use it, the bot DMs you a one-time sign-in link so you can link your personal Nelson login; every subsequent API call goes through your own Cognito token, so Nelson's existing RBAC applies exactly as it would in the Management UI.

    Usage:
    • /nelson <question> — ask Nelson anything, anywhere in Slack
    • /nelson-auth — force a fresh sign-in link (to switch accounts or refresh an expired session)
    • /nelson-help — command reference

    Safety:
    • Your Nelson password is never entered in Slack. The sign-in link opens a local page; only your refresh token is stored, encrypted in Nelson servers.
    • Destructive or high-risk requests (deletes, payment changes, production writes) are escalated to a named admin instead of executed.
    • Every tool call is auditable and scoped to your Nelson permissions.

    Built on Claude Agent SDK + Amazon Bedrock using the EU servers. Maintained by the Nelson platform team.
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Nelson
    always_online: true
  slash_commands:
    # url: per-command slash-command endpoint. Slack POSTs here when the
    # user types the command in any channel/DM. Must match the Express
    # route in src/index.ts (/slack/commands).
    - command: /nelson
      url: https://assistant.nelson.management/slack/commands
      description: Ask Nelson anything. First use will DM you a sign-in link.
      usage_hint: "[your question]"
      should_escape: false
    - command: /nelson-auth
      url: https://assistant.nelson.management/slack/commands
      description: Force a new Nelson sign-in link (DM only)
      should_escape: false
    - command: /nelson-help
      url: https://assistant.nelson.management/slack/commands
      description: Show Nelson help
      should_escape: false
    - command: /nelson-feedback
      url: https://assistant.nelson.management/slack/commands
      description: Flag a bot reply as wrong or unhelpful (logged for a human review)
      usage_hint: "[what went wrong]"
      should_escape: false
oauth_config:
  # Scope set is intentionally full-featured so IT only approves once.
  # Each scope maps to an existing or roadmap feature — see comments.
  scopes:
    bot:
      - app_mentions:read      # receive @Nelson in channels
      - channels:history       # read public-channel messages in threads the bot is in (follow-up)
      - channels:read          # look up channel metadata for logging + admin tools
      - chat:write             # post as Nelson in DMs/threads
      - chat:write.public      # post in public channels the bot isn't a member of (rare, auth flow fallback)
      - commands               # /nelson, /nelson-auth, /nelson-help, /nelson-feedback
      - files:read             # download user-uploaded screenshots / XLSX / CSV for read_attachment tool
      - files:write            # future: bot uploads generated files (PDF export, rendered report) back to the user
      - groups:history         # private channel messages for thread follow-up
      - groups:read            # private channel metadata for logging + admin tools
      - im:history             # DMs — primary Q&A surface
      - im:read                # find DMs to open with a user (sign-in flow DMs)
      - im:write               # open a DM to post the sign-in link
      - mpim:history           # group DMs (3+ people): future team-level threads with the bot
      - mpim:read              # list group DMs
      - mpim:write             # post in group DMs
      - reactions:read         # :+1:/:-1: on bot replies = feedback signal for /learning
      - reactions:write        # :hourglass: / :white_check_mark: swap on in-flight + completed turns
      - team:read              # workspace name/id for logging, analytics attribution
      - usergroups:read        # resolve @oncall / @escalation groups for routing planned work
      - users:read             # name + id of the asker for context
      - users:read.email       # resolve Slack user → email for Nelson account-linking debug
settings:
  event_subscriptions:
    request_url: https://assistant.nelson.management/slack/events
    bot_events:
      - app_mention            # @Nelson in a channel
      - app_uninstalled        # bot removed from workspace — trigger state cleanup
      - message.channels       # public channel messages (for thread follow-up)
      - message.groups         # private channel messages (for thread follow-up)
      - message.im             # DMs
      - message.mpim           # group DMs
      - reaction_added         # feedback thumbs
      - reaction_removed       # feedback thumbs undo
      - tokens_revoked         # auth broke — alert + page
  interactivity:
    is_enabled: true
    request_url: https://assistant.nelson.management/slack/interactive
  org_deploy_enabled: false
  # Default is OFF (prod uses HTTP delivery to the ALB). Flip to true ONLY
  # when you want to run `npm run dev` on your laptop/VM and drive the bot
  # over a socket — remember to flip it back before re-pasting to Slack.
  socket_mode_enabled: false
  token_rotation_enabled: false
