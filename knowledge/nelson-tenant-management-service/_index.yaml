schema: 1
repo: nelson-tenant-management-service
purpose: >-
  Tenant + environment registry for the Nelson multi-tenant setup. Owns the
  `nelson-tenants` DynamoDB table and the `nelson-tenant-properties` S3 bucket.
  Nelson Assistant reads this table (via boto/aws-sdk, not this service) to discover
  per-tenant API base URLs; MUI calls it to populate tenant pickers.
role_in_ecosystem: >-
  Source of truth for tenant → environment(s) → hotels[] mapping. Other services
  (Nelson core, MUI, nelson-assistant) consume this to route per-tenant.

index:
  - path: .claude/knowledge/endpoints.yaml
    when: You need the HTTP surface.
  - path: .claude/knowledge/data.yaml
    when: You need the DynamoDB table shape or the S3 bucket layout.
  - path: .claude/knowledge/deploys.yaml
    when: You are deploying Lambda or changing IAM / env.

absolute_rules:
  - WRITE endpoint (POST /api/tenant/:tenantname/:environmentname) is destructive — escalate, never auto-invoke.
  - Safe reads: GET /api/tenant/listtenants, GET /api/tenant/:tenantname/:environmentname.
