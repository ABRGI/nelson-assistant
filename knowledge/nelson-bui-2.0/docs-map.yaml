schema: 1
node: docs-map
purpose: BUI 2.0 has a well-maintained docs/*.md set. This leaf points at the right doc for each concern so the agent doesn't re-discover.
related: [.claude/knowledge/stack.yaml]

docs:
  - path: docs/00-overview.md
    for: Project shape, module layout.
  - path: docs/01-architecture.md
    for: Routing, top-level layout, component boundaries.
  - path: docs/02-state-management.md
    for: Zustand stores, persistence, shared selectors.
  - path: docs/03-booking-flow.md
    for: Guest booking (search → select → confirm → pay).
  - path: docs/04-manage-booking-flow.md
    for: "My Booking" post-booking flow (view, cancel, change-date).
  - path: docs/05-payments.md
    for: Paytrail v1/v2, gift card, voucher, Netaxept wiring.
  - path: docs/06-feature-flags.md
    for: GlobalHotelConfig.feature.* + per-flag behavior (membership, eciLco, golf, etc.).
  - path: docs/07-api-reference.md
    for: Authoritative API reference — URL prefixes, `authApi.ts` endpoints, admin-gating rule.
  - path: docs/08-security.md
    for: Auth flow, token handling, CSRF/CSP notes.
  - path: docs/09-testing.md
    for: Vitest / Playwright setup + conventions.
  - path: docs/10-environments.md
    for: local / staging / prod + env variable mapping.
  - path: docs/11-analytics.md
    for: Tracking (The Hotel Network, GA, etc.)
  - path: docs/12-validation.md
    for: Form validation conventions.
  - path: docs/13-hooks.md
    for: React hook conventions used across the codebase.
  - path: docs/common_bugs.md
    for: Known bugs & gotchas.
  - path: docs/update_history.md
    for: Changelog-style recent changes.

rule_for_agent: >-
  If the question matches a topic above, read that single doc — not the whole
  tree. Do NOT combine with docs from nelson/docs/ unless the question spans
  both the booking UI and the backend.

component_location_hints:
  # Saves a deep_research call when the user asks "where does X live in BUI?".
  # Answer from this map first; only fall back to deep_research if the target
  # isn't here AND the docs above don't cover it. ONE deep_research call max.
  booking_flow_pages:        src/pages/booking/**
  manage_booking_pages:      src/pages/my-booking/**
  shared_ui_components:      src/components/**
  forms_and_validation:      src/components/forms/** (+ docs/12-validation.md)
  api_wrappers:              src/services/api/*.ts (authApi.ts for admin-gated)
  localisation_strings:      src/services/localization/*.ts + src/locales/**
  zustand_stores:            src/stores/*.ts (see docs/02-state-management.md)
  feature_flags_usage:       search for GlobalHotelConfig.feature. (see docs/06-feature-flags.md)
  payments_integration:      src/pages/booking/payment/** + docs/05-payments.md
  breakfast_and_extras_upsell:
    directory: src/pages/booking/extras/**
    likely_component_names: [BreakfastExtra, ExtraCard, ExtrasList, ExtraProducts, ExtraRow, ExtraItem]
    parent_page: src/pages/booking/extras/ExtrasPage.tsx (or equivalent index file under that directory)
    content_location: NOT in the BUI repo — the displayed breakfast/ECI/LCO times and prices come from `nelson-client-configuration/src/config/<client>/*.json`. See cross-repo/content-map.yaml. To CHANGE the displayed string/price/hours, update the content repo, not the BUI.
    component_vs_content_rule: |
      If the user asks "which component renders the breakfast upsell?" the
      answer is in the BUI (src/pages/booking/extras/**). If the user asks
      "how do I change the breakfast times shown?" or "the breakfast
      description is wrong", the answer is in nelson-client-configuration.
      Disambiguate BEFORE calling deep_research — many past threads wasted
      source reads because the wrong repo was searched.
  hotel_selector_and_search: src/pages/booking/search/**
  auth_and_sign_in:          src/pages/auth/** + docs/08-security.md

how_to_answer_where_is_X_questions:
  rule: Check component_location_hints first. If a match is found, cite the directory + the relevant doc from docs-map as the Source. Only call deep_research when the map above doesn't name the area.
  remember: The user rarely needs the exact file:line — the directory + relevant doc is usually enough. If they ask for the line, THEN call deep_research (once) with a targeted grep.
