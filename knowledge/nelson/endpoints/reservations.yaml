schema: 1
node: endpoints/reservations
purpose: Search, fetch, update, cancel, and email reservations.
related: [.claude/knowledge/tasks.yaml, .claude/knowledge/enums.yaml, .claude/knowledge/bugs.yaml]

identifiers:
  # DB-verified formats (scripts/reservation-formats.js, 2026-04-22). Use the
  # shape of the literal the user pasted to decide DB vs API up front.
  uuid:
    format: 36-char UUID (8-4-4-4-12 hex)
    db_column: nelson.reservation.uuid (varchar 50)
    always_set_for: every reservation on every channel
  reservation_code:
    format: exactly 9 digits (e.g. `717463067`, `426840568`)
    db_column: nelson.reservation.reservation_code (varchar 20)
    always_set_for: every reservation on every channel (NELSON, BOOKINGCOM, EXPEDIA, MOBILEAPP)
    note: Nelson's own booking reference — NOT the OTA's reference.
  booking_channel_reservation_id:
    format: exactly 10 digits (Booking.com AND Expedia)
    db_column: nelson.reservation.booking_channel_reservation_id (varchar 50)
    set_for_channels: [BOOKINGCOM, EXPEDIA]
    null_for_channels: [NELSON, MOBILEAPP, LEGACY]
    note: The OTA's own reference (guest sees this in their OTA account).
  internal_id:
    format: bigint (int8) — auto-increment PK
    db_column: nelson.reservation.id
    used_when: internal cross-table joins only; users never see this.

how_to_route_a_user_supplied_identifier:
  # When the user pastes an identifier and asks to look up a reservation, map
  # to the right lookup path by SHAPE before calling the API. DB lookups are
  # faster and authoritative; the API's /reservations?code= search is fuzzy.
  - shape: 36-char UUID (8-4-4-4-12 hyphen pattern)
    first_lookup: GET /api/management/secure/reservations/{uuid}
    fallback: psql -c "SELECT * FROM nelson.reservation WHERE uuid = '{uuid}'"
  - shape: exactly 9 digits
    first_lookup: psql -c "SELECT id, uuid, reservation_code, booking_channel, booking_channel_reservation_id, state FROM nelson.reservation WHERE reservation_code = '{code}'"
    then: take the returned uuid and use it in /api/management/secure/reservations/{uuid}, payments, invoices, etc.
    why_db_first: The API's /reservations?code= search is fuzzy and sometimes misses exact matches; the DB row is authoritative.
  - shape: exactly 10 digits (likely Booking.com / Expedia OTA confirmation number)
    first_lookup: psql -c "SELECT id, uuid, reservation_code, booking_channel, booking_channel_reservation_id FROM nelson.reservation WHERE booking_channel_reservation_id = '{n}'"
    then: take the returned uuid and continue via the API.
  - shape: other digits / alpha / unclear
    first_lookup: API search /api/management/secure/reservations?code=... OR ?guestName= + ?customerEmail=
    fallback: psql with LIKE on reservation_code or a join on customer fields.

never_do_this:
  - Conclude "reservation does not exist" from a single API 404/500 on /reservations/{id} — the identifier shape may not match the endpoint. Fall back to the DB by shape before making that conclusion.
  - Paste a 9-digit reservation_code into a path expecting uuid — it will 404 on UUID path-param validation.
  - Use booking_channel_reservation_id in paths that expect Nelson's reservation_code or uuid — those endpoints accept only the internal identifiers.

staff_search_and_fetch:
  search:
    method: GET
    path: /api/management/secure/reservations
    query:
      - hotelIds: csv of numeric hotel ids
      - startDate, endDate: YYYY-MM-DD
      - dateMode: EXACT | ARRIVAL | DEPARTURE | STAY | CREATED
      - state: CONFIRMED | CANCELLED | BLOCKED | INITIAL | PENDING_CONFIRMATION | CHECK_IN_INCOMPLETE
      - channel: NELSON | BOOKINGCOM | EXPEDIA | MOBILEAPP | LEGACY
      - totalCount: true (recommended — pagination cursor is flaky)
      - code, uuid, guestName, customerEmail
  count:
    method: GET
    path: /api/management/secure/reservations-count
  by_uuid:
    method: GET
    path: /api/management/secure/reservations/{uuid}
  rooms_for_reservation:
    method: GET
    path: /api/management/secure/reservations/rooms
  arrivals_broken:
    method: GET
    path: /api/management/secure/reservations/arrivals
    status: BROKEN — returns 500. Use search with dateMode=EXACT instead. See bugs.yaml.

staff_update:
  update:
    method: PUT
    path: /api/management/secure/reservations/{uuid}
    body: ReservationUpdateRequestBody
    destructive: true       # agent must escalate
  cancel:
    method: DELETE
    path: /api/management/secure/reservations/{uuid}/cancel
    destructive: true
  confirm_pending:
    method: POST
    path: /api/management/secure/reservations/{uuid}/confirm
    destructive: true
  unblock:
    method: POST
    path: /api/management/secure/reservations/{uuid}/unblock
    destructive: true
  cancel_change:
    method: PUT
    path: /api/management/secure/reservations/{uuid}/cancel-change
  preview:
    method: POST
    path: /api/management/secure/reservation-preview
  update_lang:
    method: PUT
    path: /api/management/secure/reservation/update-lang

guests:
  list:
    method: GET
    path: /api/management/secure/reservations/{uuid}/guests
  one:
    method: GET
    path: /api/management/secure/reservations/{uuid}/guests/{guestId}
  update:
    method: PUT
    path: /api/management/secure/reservations/{uuid}/guests/{guestId}
    destructive: true
  delete:
    method: DELETE
    path: /api/management/secure/reservations/{uuid}/guests/{guestId}
    destructive: true

public:
  create_reservation:
    method: POST
    path: /api/reservations
    body: ReservationRequest
    note: Public booking creation — not for the assistant to call. Escalate if user asks to make a booking.
  details_by_uuid:
    method: GET
    path: /api/reservations/{uuid}
  preview:
    method: GET
    path: /api/reservation-preview
  find:
    method: POST
    path: /api/findReservation
  cancel:
    method: PUT
    path: /api/reservations/{uuid}/cancel
    destructive: true

receipt_pdf:
  method: GET
  path: /api/reservations/{uuid}/download-receipt/{lang}
  query_optional:
    - type: ConfirmationType (default DEFAULT)
    - refund: bool (default false)
    - isFromEmail: bool (default false)
  returns: application/pdf

segments_and_labels:
  apply_segments:
    method: POST
    path: /api/management/secure/reservations/{uuid}/segments
  label_get:
    method: GET
    path: /api/management/secure/reservations/{uuid}/labels/{poId}
  label_set:
    method: PUT
    path: /api/management/secure/reservations/{uuid}/labels/{poId}

activity_log:
  user_actions:
    method: GET
    path: /api/management/secure/user_activity_log/reservation/{code}
  comments:
    method: GET
    path: /api/management/secure/user_activity_log/comments/reservation/{code}
  add_comment:
    method: POST
    path: /api/management/secure/user_activity_log/comment/save
  system_log:
    method: GET
    path: /api/management/secure/reservation-log/{code}

state_machine_reference: docs/03-booking-flows.md
enum_reference: .claude/knowledge/enums.yaml
