schema: 1
node: tenant-hotels
purpose: Roster of Prod Omena hotels (label + city + numeric id + name) so the bot can short-circuit "which hotel?" without hitting the API. Tenant-scoped — refresh via `/train` whenever hotels are added, opened or sunset.
when_to_load: When a question references a hotel, a city that maps to multiple hotels, or the classifier needs to list available hotels in a clarifying reply.
related: [.claude/knowledge/hotel-identity.yaml, .claude/knowledge/endpoints/hotels.yaml]

authority_and_freshness:
  # DB-sourced. Refreshed via /train on 2026-04-22.
  last_db_refresh: 2026-04-22
  connection: observer_user via PSQL_READ_ONLY_URL (nelson schema)
  refresh_source: SELECT id, label, name, city, currency, country, time_zone, available FROM nelson.hotel ORDER BY id;
  tenant: Prod Omena (DEFAULT_TENANT_ID 9b0703a5-48ae-46ef-9bf4-790c521e0586)
  note: For any other tenant (Exhibition, Salo, etc.) this leaf must be re-derived against that tenant's schema.

