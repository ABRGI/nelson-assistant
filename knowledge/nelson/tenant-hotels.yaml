city_to_labels:
  # Available hotels by city. Cities mapping to >1 label are flagged in
  # ambiguous_cities below — always clarify before proceeding.
  Helsinki:   [HKI2, HKI3]
  Jyväskylä:  [JYL1]
  Tampere:    [TRE2]
  Turku:      [TKU1, TKU2]
  Vaasa:      [VSA2]
  Pori:       [POR2]
  Hanko:      [HAN1]
  Joensuu:    [JOE1]

ambiguous_cities:
  # Always clarify which of these hotels before proceeding.
  - Helsinki
  - Turku

usage_notes:
  - Use `label` (string, e.g. HKI2) for path params on /api/prices/{label}, /api/doors/{label}, etc.
  - Use `id` (numeric) for path params on /api/management/secure/hotels/{id}, ?hotelIds= query, etc. See hotel-identity.yaml for the full routing.
  - When a user writes a label in any case (hki2, Hki2, HKI2) uppercase and look it up here before passing on.
  - If a user names a sunset label (HKI1, SJK1, VSA1, TRE1, etc.), reply "that hotel is no longer operating under Omena — did you mean <nearby active label>?"

never_ask_for_hotel_when:
  # Classifier should skip the "which hotel?" prompt here.
  - A reservation number is present in the message (hotel is derivable from the reservation record).
  - The message literally says "all hotels", "across the chain", "chain-wide", "portfolio", "every hotel".
  - The question is a chain-wide report by definition — see chain_wide_reports.
  - A label from the active `hotels` list above appears in the message text (case-insensitive).
  - A label appears in any earlier bot or user message in the current Slack thread.

chain_wide_reports:
  - Sales forecast (chain total)
  - Revenue report (with optional hotelIds filter; default = all)
  - New sales report
  - Occupancy summary (all hotels, same calendar period)
  - Any "list all hotels" or "summary by hotel" intent
