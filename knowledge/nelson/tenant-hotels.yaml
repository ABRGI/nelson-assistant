  - { label: HKI1,  id: 1,  city: Helsinki,   name: "Omena Eerikinkatu 24" }
  - { label: SJK1,  id: 4,  city: Seinäjoki,  name: "Omena Kalevankatu 2" }
  - { label: TRE1,  id: 5,  city: Tampere,    name: "Omena Hämeenkatu 28" }
  - { label: VSA1,  id: 8,  city: Vaasa,      name: "Omena-hotelli Vaasa, Postitalo" }
  - { label: KAO1,  id: 10, city: Ruka,       name: "Omena (Ruka)" }
  - { label: CPH1,  id: 11, city: Copenhagen, name: "Omena Colbjørnsensgade 5-11" }
  - { label: LAH1,  id: 12, city: Lahti,      name: "Omena Rauhankatu 14" }
