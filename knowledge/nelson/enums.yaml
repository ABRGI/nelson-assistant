schema: 1
node: enums
purpose: Valid enum values. Invalid values → 400 at the API. Don't guess — look up here.
when_to_load: Whenever the agent has to compose a filter, a state check, a type path param, or interpret a response field that's a known enum.
related: [.claude/knowledge/endpoints/reservations.yaml, .claude/knowledge/tasks.yaml, .claude/knowledge/db/schema.yaml]

authority_and_freshness:
  # Refreshed via the `/train` skill step "refresh enums from DB" on 2026-04-22.
  # Values marked ✓DB are DISTINCT-verified against production DB via the
  # observer connection. Values marked ✓source come from the nelson repo
  # (application enums not backed by pg_enum / not present in DB).
  last_db_refresh: 2026-04-23
  connection: observer_user via PSQL_READ_ONLY_URL (nelson schema)
  pg_enum_note: |
    Only 5 PostgreSQL-native enums exist in the `nelson` schema
    (workflow_status, action_type, room_clean_status_event_*, member_deletion_status).
    All "business" enums (ReservationState, BookingChannel, ProductType, ChangeType, RoomType)
    are stored as varchar columns and validated at the application layer — so the
    authoritative list is DISTINCT(column) from production data.

# ── Reservations ─────────────────────────────────────────────────────────────
ReservationState:                      # ✓DB (DISTINCT from nelson.reservation.state)
  - INITIAL
  - PENDING_CONFIRMATION
  - CONFIRMED
  - BLOCKED
  - CANCELLED
ReservationType:                       # ✓DB (integer column, counts shown here)
  1: NORMAL                            # ~1.39M rows
  2: GROUP                             # ~5k rows
  3: CONTRACT                          # ~6.4k rows
ChangeType:                            # ✓DB (DISTINCT from nelson.reservation.change_type)
  - EXTEND
  - MINOR_CHANGE
  - MOVE
  - SHORTEN
  # Note: "NO_CHANGE" appears in source code / DTOs as a sentinel but never
  # lands in the DB column. If you filter by change_type, stick to the 4 above.
BookingChannel:                        # ✓DB (DISTINCT from nelson.reservation.booking_channel)
  - NELSON                             # direct via MUI / BUI
  - BOOKINGCOM
  - EXPEDIA
  - LEGACY                             # legacy PMS migration data
  - MOBILEAPP                          # Omena guest app
CancellationReason:                    # ✓source (application DTO, no DB DISTINCT sampled)
  - TRIP_GOT_CANCELLED
  - FOUND_BETTER_RATE_AT_OTHER_HOTEL
  - FOUND_BETTER_RATE_AT_OMENA
  - OTHER

# ── Products & rooms ─────────────────────────────────────────────────────────
ProductType:                           # ✓DB (DISTINCT from nelson.product.type)
  - ACCOMMODATION                      # 21 rows — one per room-type×hotel
  - BREAKFAST
  - BROKEN_ITEM
  - COMPENSATE
  - ECI                                # early check-in
  - EXTRA_BED
  - FENNOA_ADDITIONAL
  - GOLF
  - INVOICE_SURCHARGE
  - LCO                                # late check-out
  - OTHER
  - PET_FRIENDLY
  - REFUNDED_GIFT_CARD
  - SAMEDATE_ECI_FLEX

RoomType:
  # The nelson.room table has NO `type` / `room_type` column. A room's "type"
  # is the `type` of its associated product (room.product_id → product.type).
  # In Prod Omena only ACCOMMODATION products back rooms (705 available rooms,
  # all ACCOMMODATION). The labels below are the room-SIZE classes used in
  # pricing rules and APIs — they surface via the product NAME / product.label
  # and in API responses (RoomPrice.roomType), not as a DB column.
  # ✓source from reservation-core enums.
  room_size_classes:
    - WINDOWLESS
    - STANDARD
    - SUITE
    - SUPERIOR
    - SINGLE
    - SINGLE_TV_LESS
    - STANDARD_TV_LESS
    - CELL_ROOM_SINGLE
    - CELL_ROOM
    - STANDARD_SHARED_BATHROOM
    - STANDARD_PLUS

