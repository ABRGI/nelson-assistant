# ── DB refresh command reference ─────────────────────────────────────────────
how_to_refresh_from_db:
  run_script: node scripts/db-dump.js > /tmp/db-dump.json   # dev box, observer tunnel must be open
  distinct_queries:
    ReservationState: |
      SELECT DISTINCT state FROM nelson.reservation WHERE state IS NOT NULL ORDER BY state;
    BookingChannel: |
      SELECT DISTINCT booking_channel FROM nelson.reservation
       WHERE booking_channel IS NOT NULL ORDER BY booking_channel;
    ChangeType: |
      SELECT DISTINCT change_type FROM nelson.reservation
       WHERE change_type IS NOT NULL ORDER BY change_type;
    ProductType: |
      SELECT DISTINCT type FROM nelson.product ORDER BY type;
  pg_enums: |
    SELECT t.typname AS name, array_agg(e.enumlabel ORDER BY e.enumsortorder) AS labels
      FROM pg_type t JOIN pg_enum e ON e.enumtypid = t.oid
      JOIN pg_namespace n ON n.oid = t.typnamespace
     WHERE n.nspname = 'nelson'
     GROUP BY t.typname;
  never_run_on_these: [nelson.reservation, nelson.line_item, nelson.audit_log, nelson.audit_log_event]
