schema: 1
node: output-format
purpose: HARD RULE for every Slack reply that reports facts from Nelson. Show sources + assumptions so the user can verify.
related: [.claude/knowledge/authority-boundary.yaml, .claude/knowledge/conventions.yaml]

why_this_matters:
  - The assistant has been caught returning data that doesn't match what the user sees in Nelson (e.g. a date interpreted as 2025 when the user meant 2026; a price that didn't match the MUI).
  - Without sources, every answer is a black box. The user can't tell hallucination from data-drift from correct-but-unexpected-behaviour.
  - Citations also force the agent to *notice* its own assumptions and flag them before answering.

every_factual_reply_must_include:
  - a "Source" line naming the endpoint or DB path used — but do NOT paste SQL text or source-code lines into the Slack reply (see never_show_the_user).
  - an "Assumptions" line if the agent inferred any parameter (dates, occupancy, hotel scope, tenant).

never_show_the_user:
  - Raw SQL query text (SELECT …). Cite "DB: beonx_xml_log ORDER BY sent_date DESC LIMIT 1" or the query name from `db/queries.yaml`. The full SQL goes into trace logs (chatlog), not the Slack reply.
  - Source-tree file:line paths, function names, or code snippets. Cite the concept ("per the ReservationService underage rule"), not the code.
  - Implementation details (class names, ORM internals, stack traces). If a user asked "how does X work internally", escalate or answer in hotel-ops terms, never with code.
  - Why: the reply is consumed by hotel ops / support staff. Code and SQL are noise + a leak surface. All of that lives in the chatlog traces.

default_breakdown_on_quantitative_replies:
  rule: Whenever a factual answer includes counts, totals, revenue, occupancy, or any aggregate, default to breaking the answer down along every relevant dimension the data carries — UNLESS the user asked for a single scalar.
  dimensions_to_always_split_by:
    - hotel (label + city/name)
    - booking channel (DIRECT / BOOKINGCOM / EXPEDIA / HOTELS / etc.)
    - room type (STANDARD / FAMILY / …)
    - date scope — for reservation/volume questions, distinguish:
      - created_today — bookings made today regardless of stay date
      - arriving_today — reservations whose check-in is today
      - staying_tonight — reservations that overlap tonight (occupancy proxy)
  example_bad:
    user: "How many reservations have been made from Booking.com today?"
    reply: "98 arrivals today. CONFIRMED 95, CANCELLED 3."
    why_bad: Conflates "made today" with "arriving today". No per-hotel split. No per-room-type split. Silently scopes to all hotels without flagging.
  example_good:
    user: "How many reservations have been made from Booking.com today?"
    reply_structure: |
      Three different reads of "today" for Booking.com, all hotels:

      • *Created today* (booking_date = 2026-04-22): N total
          HKI2: a (STANDARD b, FAMILY c)
          HKI3: d (STANDARD e, FAMILY f)
          …
      • *Arriving today* (arrival_date = 2026-04-22): M total
          … (same per-hotel / per-room-type split)
      • *Staying tonight* (arrival_date ≤ 2026-04-22 < departure_date): K total
          … (same split)

      Which of these did you mean? Happy to drill into any single hotel / channel / room type.
    why_good: Surfaces the three legitimate readings so the user spots the one they meant. Breaks each down by hotel + room type. Invites a follow-up rather than assuming.
  opt_out: If the user explicitly asks for a single number ("just the total, don't split"), return the scalar + the Assumed/Source footer. Honor their ask.
  no_data_for_a_dimension: If one dimension is missing from the source (e.g. room_type not in the channel-summary endpoint), state "(not available in this source)" for that dimension — do NOT fabricate a split.

clarify_before_answering:
  rule: If the question is ambiguous AND the ambiguity would materially change the answer, ask ONE short clarifying question before running any expensive queries.
  triggers:
    - Date word ambiguous: "today / tomorrow / this week" with no reservation-vs-arrival-vs-stay anchor.
    - Hotel scope ambiguous: user names a city with multiple hotels (Helsinki → HKI2 / HKI3) OR asks "all hotels" on a tenant with >5 hotels.
    - Metric ambiguous: "occupancy" (physical vs sold), "revenue" (booked vs earned vs arrival-date), "reservations" (created / arriving / staying).
    - Scope ambiguous: "last quarter" → calendar Q1 or last 90 days? "YoY" → -364 days or same calendar date last year?
  how_to_ask:
    - Stay one short line. Offer 2–3 concrete interpretations the user can pick from.
    - Do NOT ask more than one clarifying question at a time. Pick the highest-information-gain one.
    - If unsure which interpretation is cheaper: ask rather than run the expensive one.
  what_not_to_do:
    - Do not silently pick an interpretation and bury it in an Assumed footer when the right answer changes by an order of magnitude across interpretations.
    - Do not ask clarifying questions for conversational asks or for genuinely simple single-hotel single-metric questions.
  example:
    user: "How many reservations for today?"
    good: "To give you the right cut: (a) created today, (b) arriving today, or (c) staying tonight? And which hotel(s)?"
    bad: Launches an API call assuming "arrivals at the default hotel" with no clarification.

slack_format:
  answer_body: concise hotel-ops answer, bulleted or short paragraph. No raw JSON.
  separator: one blank line.
  source_footer:
    - '_Source: GET /api/prices/HKI2/2026-05-10/2026-05-11/1/1/0/ → nelsonPriceList[0].selectedDateRangePrices[0].pricePerDate (€70.65), numberOfAvailableRooms (11)_'
    - 'Use Slack mrkdwn italic (_..._) for the source line so it visually ranks below the answer.'
  assumptions_footer:
    - '_Assumed: 1 room, 1 adult, 1 night; interpreted "10 May" as 2026-05-10 (current year)._'
  multiple_sources: one line per endpoint/query; in order of use.
  never: bare "based on Nelson data" — either cite the endpoint or don't make the claim.

what_to_cite:
  http_endpoint: method, path, key query params (not the whole URL with auth), and the exact JSON field path(s) you read.
  sql: the query name from db/queries.yaml OR a one-line paraphrase (`SELECT hotel_label, xml_type, sent_date FROM beonx_xml_log ORDER BY sent_date DESC LIMIT 1`).
  code: file:line if you used the source tree to answer "where does X live".
  docs: path to the docs/*.md section ONLY when docs were the sole source and no code/API validated it.

what_to_flag_as_assumption:
  date_interpretation: If user says "10 May" or "last Tuesday", resolve to an explicit YYYY-MM-DD and state it. Today's date is known via the system prompt.
  occupancy_defaults: If user omitted rooms/adults/children/nights, state the defaults you applied.
  hotel_scope: If user named a hotel ambiguously (e.g. "Helsinki" → HKI2 vs HKI3), state your pick.
  tenant: If more than one tenant configured and a default was used, state the tenant.
  year: When the month+day doesn't include a year, ALWAYS mention which year you used. Past dates older than today → last year; future → this year.

anti_hallucination:
  rule: Never report a field value you did not literally read from a tool result OR derive via a named formula (e.g. kpis.yaml#adr). If a field isn't in response-shapes.yaml or a known schema, read it from the API response before citing.
  specific_trap: "Sold out: No" and "Available rooms: 11" came from different endpoints (or not from Nelson at all). Do not combine fields across responses unless both are in the same tool result and explicitly cited.
  when_source_cannot_be_shown:
    - If the fact is from conversation context (the user told you earlier), say "per your earlier message" — not a forged endpoint citation.
    - If it's an inference, say "(inferred)" with the reasoning.

worked_example:
  user: "What's availability on 10 May for HKI2?"
  bad_reply: |
    Here's availability for HKI2 (Helsinki, Lönnrotinkatu) on 10 May 2025:
    • Available rooms: 11
    • Price: €70.65/night (1 room, 1 adult)
    • Sold out: No
    Check-in from 16:00, check-out by 12:00.
  why_bad: No sources. Year silently defaulted to 2025. Combines fields that came from different places. Check-in times may be hallucinated.
  good_reply: |
    For *HKI2* on *2026-05-10* (1 room, 1 adult, 1 night):
    • Available rooms: 11
    • Suggested nightly rate: €70.65
    • Sold out: no

    _Assumed 2026 (current year); 1 room / 1 adult / 1 night; 1-night stay 2026-05-10→2026-05-11._
    _Source: GET /api/prices/HKI2/2026-05-10/2026-05-11/1/1/0/ → nelsonPriceList[0].selectedDateRangePrices[0].{pricePerDate, numberOfAvailableRooms, soldOut}_

conversational_short_replies:
  rule: "When the Haiku classifier routes a message as 'conversational' (greetings, small-talk, follow-ups answerable from chat history), no source citation is needed — but if the follow-up references a prior data claim, reference the prior turn rather than inventing a new source."
